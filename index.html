<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理后台界面目录</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d9e0ea;
      --line-soft: #edf1f6;
      --primary: #2563eb;
      --primary-soft: #eaf2ff;
      --shadow: 0 14px 36px rgba(31, 41, 55, .10);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      overflow: hidden;
    }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .sidebar {
      min-width: 0;
      background: var(--panel);
      border-right: 1px solid var(--line-soft);
      display: flex;
      flex-direction: column;
      padding: 24px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .nav-label {
      color: var(--muted);
      font-size: 12px;
      margin: 0 0 10px;
    }

    .nav-list {
      display: grid;
      gap: 8px;
    }

    .nav-item {
      width: 100%;
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      text-align: left;
      text-decoration: none;
      cursor: pointer;
      font: inherit;
    }

    .nav-item:hover,
    .nav-item.active {
      border-color: #c9dbff;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
    }

    .nav-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #eef2f7;
      color: #475569;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .nav-item.active .nav-icon,
    .nav-item:hover .nav-icon {
      background: var(--primary);
      color: #fff;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .content {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 72px minmax(0, 1fr);
    }

    .topbar {
      background: rgba(255, 255, 255, .86);
      border-bottom: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 24px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .summary {
      margin: 4px 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .open-link {
      min-width: 94px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }

    .open-link:hover {
      border-color: #9bbcf8;
      color: var(--primary);
    }

    .viewer-wrap {
      min-height: 0;
      padding: 18px;
    }

    .viewer {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      display: block;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .shell {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line-soft);
      }

      .content {
        min-height: 720px;
        grid-template-rows: auto minmax(640px, 1fr);
      }

      .topbar {
        align-items: flex-start;
        padding: 18px;
        flex-direction: column;
      }

      .viewer-wrap {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar" aria-label="后台界面菜单">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div>
          <div class="brand-title">管理后台</div>
          <div class="brand-subtitle">界面原型目录</div>
        </div>
      </div>

      <p class="nav-label">界面列表</p>
      <nav class="nav-list">
        <a class="nav-item active" href="./role-management-prototype.html" target="pageViewer" data-title="商户后台角色管理" data-desc="角色列表、权限配置、角色创建与管理相关的后台界面原型。">
          <span class="nav-icon">角</span>
          <span>商户角色管理</span>
        </a>
        <a class="nav-item" href="./hot-recommendation-content-config.html" target="pageViewer" data-title="菜单设置" data-desc="热门推荐内容配置、展示顺序与启停状态相关的后台界面原型。">
          <span class="nav-icon">菜</span>
          <span>菜单设置</span>
        </a>
        <a class="nav-item" href="./product-template-management.html" target="pageViewer" data-title="产品模板管理" data-desc="产品模板筛选、模板列表与打包配置弹窗相关的后台界面原型。">
          <span class="nav-icon">模</span>
          <span>产品模板管理</span>
        </a>
        <a class="nav-item" href="./产品模板管理菜单.html" target="pageViewer" data-title="产品模板管理菜单" data-desc="产品模板管理相关的菜单配置后台界面原型。">
          <span class="nav-icon">单</span>
          <span>产品模板管理菜单</span>
        </a>
        <a class="nav-item" href="./产品列表管理.html" target="pageViewer" data-title="产品列表管理" data-desc="产品列表管理相关的后台界面原型。">
          <span class="nav-icon">列</span>
          <span>产品列表管理</span>
        </a>
        <a class="nav-item" href="./video-management.html" target="pageViewer" data-title="视频管理" data-desc="视频标签、菜单筛选、批量操作与视频列表相关的后台界面原型。">
          <span class="nav-icon">视</span>
          <span>视频管理</span>
        </a>
        <a class="nav-item" href="./video-menu-multi-prototype.html" target="pageViewer" data-title="视频多菜单关联" data-desc="内容关联多个菜单、菜单维度上下架、查看全部与设置菜单弹窗的静态原型。">
          <span class="nav-icon">多</span>
          <span>视频多菜单关联</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        后续新增页面时，在左侧菜单增加一个入口，并把右侧预览地址指向新的 HTML 文件。
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">商户后台角色管理</h1>
          <p class="summary" id="pageDesc">角色列表、权限配置、角色创建与管理相关的后台界面原型。</p>
        </div>
        <a class="open-link" id="openCurrent" href="./role-management-prototype.html" target="_blank" rel="noopener">单独打开</a>
      </header>

      <section class="viewer-wrap" aria-label="后台界面预览">
        <iframe class="viewer" name="pageViewer" id="pageViewer" src="./role-management-prototype.html" title="商户后台角色管理"></iframe>
      </section>
    </main>
  </div>

  <script>
    const navItems = Array.from(document.querySelectorAll(".nav-item"));
    const title = document.getElementById("pageTitle");
    const desc = document.getElementById("pageDesc");
    const openCurrent = document.getElementById("openCurrent");
    const viewer = document.getElementById("pageViewer");

    function activate(item) {
      navItems.forEach((navItem) => navItem.classList.toggle("active", navItem === item));
      title.textContent = item.dataset.title;
      desc.textContent = item.dataset.desc;
      openCurrent.href = item.getAttribute("href");
      viewer.title = item.dataset.title;
    }

    navItems.forEach((item) => {
      item.addEventListener("click", () => activate(item));
    });
  </script>
</body>
</html>
